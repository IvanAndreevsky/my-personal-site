    <main>
        <section class="contacts-section">
            <div class="container">
                <h2 class="section-title">Свяжитесь со мной</h2>
                
                <div class="contacts-grid">
                    <div class="contacts-info">
                        <div class="contact-item">

                                <a href="tel:+79151079198">+7 (915) 107-91-98</a>
                            </div>
                        </div>
                        
                        <div class="contact-item">
                            <div class="contact-icon">✉️</div>

                                <a href="mailto:ivan-a.a@mail.ru">ivan-a.a@mail.ru</a>

                    <div class="social-row">
                        <a href="https://vk.com/jesteeer" target="_blank" class="social-card">

        <!-- Кнопка для открытия формы обратной связи -->
        <section class="form-button-section">
            <div class="container">
                <button id="openFormBtn" class="btn btn-primary">Написать сообщение ✉️</button>
            </div>
        </section>
    </main>

    <!-- МОДАЛЬНОЕ ОКНО С ФОРМОЙ ОБРАТНОЙ СВЯЗИ -->
    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Обратная связь</h3>
                <span class="closeModal">&times;</span>
            </div>
            <form id="feedbackForm" method="post">
                <div class="form-group">
                    <label>ФИО *</label>
                    <input type="text" name="fio" placeholder="Иванов Иван Иванович" required>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" name="email" placeholder="ivan@example.ru" required>
                </div>
                <div class="form-group">
                    <label>Телефон</label>
                    <input type="tel" name="phone" placeholder="+7 (999) 123-45-67">
                </div>
                <div class="form-group">
                    <label>Тема обращения *</label>
                    <select name="subject" required>
                        <option value="">-- Выберите тему --</option>
                        <option value="Вопрос о сотрудничестве">Вопрос о сотрудничестве</option>
                        <option value="Вопрос о сайте">Вопрос о сайте</option>
                        <option value="Предложение">Предложение</option>
                        <option value="Другое">Другое</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Сообщение *</label>
                    <textarea name="message" rows="4" placeholder="Введите ваше сообщение..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Как вы нашли меня?</label>
                    <div class="radio-group">
                        <label><input type="radio" name="found" value="Друзья"> Друзья</label>
                        <label><input type="radio" name="found" value="Соцсети"> Соцсети</label>
                        <label><input type="radio" name="found" value="Поисковик"> HH.ru</label>
                        <label><input type="radio" name="found" value="Случайно"> Случайно</label>

                    </div>
                </div>
               
                <button type="submit" class="btn btn-primary submit-btn">Отправить →</button>
                <p class="form-note">* — поля, обязательные для заполнения</p>
            </form>
            <div id="formMessage" class="form-message"></div>
        </div>
    </div>

    <footer>
        <div class="container">
